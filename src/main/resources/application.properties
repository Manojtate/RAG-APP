spring.application.name=first-project
server.port=8082

# OpenAI (optional)
spring.ai.openai.api-key=${OPENAI_API_KEY}

# Ollama
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=codellama:latest
spring.ai.ollama.chat.options.temperature=0.7

# Embedding Model
spring.ai.ollama.embedding.options.model=mxbai-embed-large

# Logging
logging.level.org.springframework.ai=DEBUG

# MariaDB
spring.datasource.url=jdbc:mariadb://localhost:3308/SpringAi
spring.datasource.username=root
spring.datasource.password=root123

# Vector Store
spring.ai.vectorstore.mariadb.initialize-schema=true
spring.ai.vectorstore.mariadb.distance-type=COSINE
spring.ai.vectorstore.mariadb.dimensions=1024